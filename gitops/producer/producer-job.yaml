apiVersion: batch/v1
kind: Job

metadata:
  name: producer
  namespace: kafka-demo
  annotations:
    argocd.argoproj.io/sync-options: Replace=true

spec:
  template:
    metadata:
      labels:
        app: producer

    spec:
      restartPolicy: Never

      containers:
      - name: producer
        image: 498937706265.dkr.ecr.ap-south-1.amazonaws.com/kafka-producer:v2
        imagePullPolicy: Always

        env:
        - name: KAFKA_BROKER_URL
          value: "kafka:9092"

        - name: KAFKA_TOPIC
          value: "posts"