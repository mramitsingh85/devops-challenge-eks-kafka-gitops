name: Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-south-1
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build Producer
        run: |
          docker build -t producer:${{ github.sha }} ./producer

      - name: Build Consumer
        run: |
          docker build -t consumer:${{ github.sha }} ./consumer

      - name: Push Producer
        run: |
          docker tag producer:${{ github.sha }} \
          $ECR_REGISTRY/kafka-producer:${{ github.sha }}

          docker push \
          $ECR_REGISTRY/kafka-producer:${{ github.sha }}

      - name: Push Consumer
        run: |
          docker tag consumer:${{ github.sha }} \
          $ECR_REGISTRY/kafka-consumer:${{ github.sha }}

          docker push \
          $ECR_REGISTRY/kafka-consumer:${{ github.sha }}